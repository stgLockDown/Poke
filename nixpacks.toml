# Nixpacks build config for Railway
providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "pip install -e .",
]

[phases.build]
cmds = ["python -m compileall -q src"]

[start]
cmd = "python -m pokealert.main run --config config/config.yaml"